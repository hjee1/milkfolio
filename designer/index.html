<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Designer — Coming Soon</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>M</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a080c;
      color: #e8d8e4;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(212,184,204,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(212,184,204,0.4);
      border: 1px solid rgba(212,184,204,0.15);
      padding: 0.25rem 0.8rem;
      border-radius: 2px;
      margin-bottom: 2.5rem;
      display: inline-block;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.04em;
      line-height: 1.05;
      color: #f0e8ec;
      margin-bottom: 0.5rem;
    }

    .role {
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(212,184,204,0.4);
      margin-bottom: 2rem;
    }

    p {
      font-size: 0.9rem;
      color: rgba(232,216,228,0.35);
      letter-spacing: 0.04em;
      margin-bottom: 3.5rem;
    }

    .home-link {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: rgba(212,184,204,0.35);
      border-bottom: 1px solid rgba(212,184,204,0.1);
      padding-bottom: 2px;
      text-decoration: none;
      transition: color 0.3s, border-color 0.3s;
    }

    .home-link:hover {
      color: rgba(212,184,204,0.7);
      border-color: rgba(212,184,204,0.35);
    }
  </style>
</head>
<body>
  <span class="badge">Coming Soon</span>
  <h1>Designer</h1>
  <p class="role">UI/UX · Product Design</p>
  <p>Portfolio in preparation.<br/>Check back soon.</p>
  <a href="../" class="home-link">← milkfolio</a>
</body>
</html>
